name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: serial_read

permissions:
  contents: read
  releases: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure arm64 linker
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build Linux x86_64 binary
        run: cargo build --release --locked

      - name: Build Linux arm64 binary
        run: cargo build --target aarch64-unknown-linux-gnu --release --locked

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp target/release/${BIN_NAME} dist/${BIN_NAME}-${{ github.ref_name }}-linux-x86_64
          cp target/aarch64-unknown-linux-gnu/release/${BIN_NAME} dist/${BIN_NAME}-${{ github.ref_name }}-linux-aarch64
          chmod +x dist/${BIN_NAME}-${{ github.ref_name }}-linux-*

      - name: List release assets
        run: ls -lh dist

      - name: Create Gitea release and upload assets
        uses: akkuman/gitea-release-action@v1
        with:
          files: |-
            dist/${{ env.BIN_NAME }}-${{ github.ref_name }}-linux-*
          name: Release ${{ github.ref_name }}
          prerelease: false
          md5sum: true
          sha256sum: true
          token: ${{ secrets.TOKEN }}
