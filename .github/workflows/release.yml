name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: serial_read

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            linker: ""
            apt: ""
          - name: linux-aarch64
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross compiler
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Configure linker
        if: matrix.linker != ''
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<EOF
          [target.${{ matrix.target }}]
          linker = "${{ matrix.linker }}"
          EOF

      - name: Build release binary
        run: cargo build --target ${{ matrix.target }} --release --locked

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${BIN_NAME} dist/${BIN_NAME}
          tar -C dist -czf ${BIN_NAME}-${{ github.ref_name }}-${{ matrix.name }}.tar.gz ${BIN_NAME}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.name }}
          path: ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.name }}.tar.gz

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/*.tar.gz \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
